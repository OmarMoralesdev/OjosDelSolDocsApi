openapi: 3.0.3
info:
  title: Ojos de Sol API
  description: |
    API REST para el sistema de monitoreo y control de paneles solares **Ojos de Sol**.

    ## Módulos
    - **Autenticación**: Registro, login, logout, 2FA, bloqueo de cuenta y recuperación de contraseña con JWT.
    - **Usuarios**: Gestión administrativa de cuentas (CRUD, activar/desactivar).
    - **Roles y Permisos**: Gestión de roles diferenciados (Administrador, Cliente).
    - **Dispositivos**: Vinculación, configuración y gestión de dispositivos ESP32.
    - **Telemetría**: Datos en tiempo real (voltaje, corriente, potencia, energía) e históricos.
    - **Comandos**: Envío de comandos manuales de ángulo al servomotor del panel solar.
    - **Alertas y Notificaciones**: Sistema de alertas automáticas y notificaciones push.
    - **Horarios**: Programación de horarios de operación por dispositivo.
    - **Reportes**: Exportación de resúmenes de generación energética en PDF.
    - **Auditoría**: Log de actividad de acceso y acciones por usuario.
    version: 1.0.0
  contact:
    name: Equipo Ojos de Sol
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor de Desarrollo Local

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────
paths:
  # ═══════════════════════════════════════════
  #  SISTEMA
  # ═══════════════════════════════════════════
  /health:
    get:
      summary: Verificar estado de la API
      description: Retorna el estado actual de salud del servidor. Debe responder en menos de 500 ms.
      operationId: getHealth
      tags:
        - Sistema
      responses:
        "200":
          description: El servicio está disponible y funcionando correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-06-20T12:00:00Z"
                  uptime:
                    type: number
                    description: Tiempo de actividad del servidor en segundos
                    example: 86400

  /dashboard/metrics:
    get:
      summary: Obtener métricas del dashboard
      description: |
        Retorna los agregados principales para el dashboard administrativo.
        Los contadores se calculan sobre usuarios, dispositivos y telemetría vigente.
      operationId: getDashboardMetrics
      tags:
        - Sistema
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Métricas del dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /system-configuration:
    get:
      summary: Obtener configuración de seguridad
      description: Retorna la configuración global de lockout e intentos de autenticación.
      operationId: getSystemConfiguration
      tags:
        - Sistema
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Configuración de seguridad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfiguration"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      summary: Editar configuración de seguridad
      description: Actualiza los valores de lockout e intentos máximos de autenticación.
      operationId: updateSystemConfiguration
      tags:
        - Sistema
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSystemConfigurationRequest"
      responses:
        "200":
          description: Configuración actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfiguration"
        "400":
          description: Valores de configuración inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                systemConfigurationValidation:
                  summary: Error de validación de configuración
                  value:
                    type: "https://api.ojosdesol.com/problems/client-validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "The request contains fields with invalid or missing values."
                    instance: "/system-configuration"
                    code: "CLIENT_VALIDATION_ERROR"
                    technical_detail: "Validation failed for fields: 'lockout', 'auth_attemps'."
                    user_message: "Los valores de configuración no son válidos."
                    errors:
                      - detail: "El valor de lockout debe ser un número entero mayor o igual a 1."
                        pointer: "/lockout"
                      - detail: "El valor de auth_attemps debe ser un número entero mayor o igual a 1."
                        pointer: "/auth_attemps"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  AUTENTICACIÓN
  # ═══════════════════════════════════════════
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      description: |
        Permite registrar un cliente o administrador en la plataforma.
        Requiere nombre, correo electrónico, contraseña y rol.
        Las contraseñas se almacenan como hash bcrypt con factor de costo mínimo de 10.
      operationId: registerUser
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registro exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Datos de registro inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                registerValidation:
                  summary: Errores de registro por campo
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de registro contiene errores en uno o más campos."
                    instance: "/auth/register"
                    invalid_params:
                      - name: "username"
                        reason: "El nombre de usuario debe tener entre 3 y 20 caracteres y contener únicamente letras, números, puntos (.) o guiones bajos (_)."
                      - name: "password"
                        reason: "La contraseña debe tener una longitud mínima de 8 caracteres."
                      - name: "email"
                        reason: "El correo electrónico debe ser una dirección de email válida y no puede exceder los 80 caracteres."
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      summary: Iniciar sesión
      description: |
        Autentica al usuario mediante correo electrónico y contraseña.
        Si la contraseña es correcta, envía un OTP de 6 dígitos al correo registrado del usuario.
        Todas las comunicaciones deben realizarse sobre HTTPS/TLS 1.2+.
      operationId: loginUser
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Desafío de 2FA generado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorChallengeResponse"
        "400":
          description: Datos de inicio de sesión inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                loginValidation:
                  summary: Errores de login por campo
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de inicio de sesión contiene errores en uno o más campos."
                    instance: "/auth/login"
                    code: "CLIENT_VALIDATION_ERROR"
                    technical_detail: "Validation failed for fields: 'email', 'password'."
                    user_message: "Algunos campos contienen errores. Por favor revísalos e intenta de nuevo."
                    errors:
                      - detail: "Se requiere una dirección de correo electrónico válida."
                        pointer: "/email"
                      - detail: "Se requiere la contraseña de acceso."
                        pointer: "/password"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "423":
          $ref: "#/components/responses/AccountLockedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/2fa/verify:
    post:
      summary: Verificar el código de autenticación de dos factores
      description: Confirma el código enviado al usuario y devuelve el token JWT si es válido.
      operationId: verifyTwoFactorCode
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorVerifyRequest"
      responses:
        "200":
          description: Verificación exitosa de 2FA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Código 2FA inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                twoFactorInvalidCode:
                  summary: Código 2FA inválido
                  value:
                    type: "https://api.ojosdesol.com/problems/client-validation-error"
                    title: "Error de Validación"
                    status: 422
                    detail: "The request contains fields with invalid or missing values."
                    instance: "/auth/2fa/verify"
                    code: "CLIENT_VALIDATION_ERROR"
                    technical_detail: "Validation failed for fields: 'email', 'code'."
                    user_message: "El código ingresado no es válido o ha expirado."
                    errors:
                      - detail: "El correo electrónico es obligatorio."
                        pointer: "/email"
                      - detail: "El código de verificación debe contener 6 dígitos."
                        pointer: "/code"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "423":
          $ref: "#/components/responses/AccountLockedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/2fa/resend:
    post:
      summary: Reenviar el código de autenticación de dos factores
      description: Genera un nuevo código y lo reenvía al correo registrado del usuario.
      operationId: resendTwoFactorCode
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorResendRequest"
      responses:
        "200":
          description: Código 2FA reenviado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorChallengeResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "423":
          $ref: "#/components/responses/AccountLockedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      summary: Cerrar sesión
      description: Invalida el token JWT del usuario actual (aplicación móvil y web).
      operationId: logoutUser
      tags:
        - Autenticación
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Sesión cerrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sesión cerrada correctamente"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/me:
    get:
      summary: Obtener el usuario autenticado
      description: Retorna el perfil del usuario autenticado a partir del token JWT vigente.
      operationId: getCurrentUser
      tags:
        - Autenticación
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/forgot-password:
    post:
      summary: Solicitar recuperación de contraseña
      description: Envía un enlace de recuperación de contraseña al correo electrónico del usuario.
      operationId: forgotPassword
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@ojosdesol.com"
      responses:
        "200":
          description: Enlace de recuperación enviado al correo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Se ha enviado un enlace de recuperación a tu correo electrónico"
        "400":
          description: Correo electrónico inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forgotPasswordValidation:
                  summary: Email inválido para recuperación
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de recuperación contiene errores de validación."
                    instance: "/auth/forgot-password"
                    invalid_params:
                      - name: "email"
                        reason: "El correo electrónico debe ser una dirección de email válida y no puede exceder los 80 caracteres."
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/reset-password:
    post:
      summary: Restablecer contraseña
      description: Permite al usuario establecer una nueva contraseña usando el token recibido por correo.
      operationId: resetPassword
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Token de recuperación recibido por correo
                  example: "eyJhbGciOiJIUzI1NiJ9..."
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  example: "NuevaContraseña123!"
      responses:
        "200":
          description: Contraseña restablecida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Contraseña actualizada correctamente"
        "400":
          description: Token o contraseña nueva inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                resetPasswordValidation:
                  summary: Errores de reseteo
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de restablecimiento contiene errores en uno o más campos."
                    instance: "/auth/reset-password"
                    invalid_params:
                      - name: "token"
                        reason: "El token de recuperación es obligatorio y debe ser válido."
                      - name: "newPassword"
                        reason: "La contraseña debe tener una longitud mínima de 8 caracteres."
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  USUARIOS (Administración)
  # ═══════════════════════════════════════════
  /users:
    get:
      summary: Listar todos los usuarios
      description: |
        Muestra la lista completa de usuarios con su información y estado de cuenta.
        Solo accesible por administradores. Soporta paginación.
      operationId: getUsers
      tags:
        - Usuarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          description: Filtrar por estado de la cuenta
          required: false
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
      responses:
        "200":
          description: Lista paginada de usuarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Crear un usuario (Admin)
      description: Permite a un administrador crear una nueva cuenta de usuario con rol asignado.
      operationId: createUser
      tags:
        - Usuarios
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Datos de usuario inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                createUserValidation:
                  summary: Errores de creación de usuario
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de creación de usuario contiene errores en uno o más campos."
                    instance: "/users"
                    invalid_params:
                      - name: "username"
                        reason: "El nombre de usuario debe tener entre 3 y 20 caracteres y contener únicamente letras, números, puntos (.) o guiones bajos (_)."
                      - name: "birth_date"
                        reason: "La fecha de nacimiento es obligatoria y debe cumplir con el formato ISO 8601 (YYYY-MM-DD)."
                      - name: "role_id"
                        reason: "El identificador de rol seleccionado es obligatorio y debe ser un número entero válido."
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/{userId}:
    get:
      summary: Obtener detalle de un usuario
      description: Retorna la información completa de un usuario específico.
      operationId: getUserById
      tags:
        - Usuarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: Detalle del usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      summary: Editar un usuario (Admin)
      description: Permite a un administrador actualizar los datos de una cuenta de usuario.
      operationId: updateUser
      tags:
        - Usuarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Datos de usuario inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                updateUserValidation:
                  summary: Errores de actualización de usuario
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de actualización de usuario contiene errores en uno o más campos."
                    instance: "/users/1"
                    invalid_params:
                      - name: "username"
                        reason: "El nombre de usuario debe tener entre 3 y 20 caracteres y contener únicamente letras, números, puntos (.) o guiones bajos (_)."
                      - name: "phone"
                        reason: "El número de teléfono debe tener un formato internacional válido y una longitud de entre 7 y 20 dígitos."
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Eliminar un usuario (Admin)
      description: Permite a un administrador eliminar una cuenta de usuario del sistema.
      operationId: deleteUser
      tags:
        - Usuarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "204":
          description: Usuario eliminado exitosamente
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/{userId}/status:
    patch:
      summary: Activar o desactivar cuenta de usuario (Admin)
      description: Permite al administrador cambiar el estado de una cuenta de usuario (activar/desactivar).
      operationId: toggleUserStatus
      tags:
        - Usuarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - active
              properties:
                active:
                  type: boolean
                  description: Estado deseado de la cuenta
                  example: false
      responses:
        "200":
          description: Estado de la cuenta actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Estado de cuenta inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                toggleUserStatusValidation:
                  summary: Error de activación/desactivación
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud para cambiar el estado de la cuenta contiene errores de validación."
                    instance: "/users/1/status"
                    invalid_params:
                      - name: "active"
                        reason: "El estado de la cuenta debe ser un valor booleano (true o false)."
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  ROLES Y PERMISOS
  # ═══════════════════════════════════════════
  /roles:
    get:
      summary: Listar roles del sistema
      description: Retorna todos los roles disponibles con sus permisos asignados.
      operationId: getRoles
      tags:
        - Roles y Permisos
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

    post:
      summary: Crear un rol (Admin)
      description: Permite al administrador crear un nuevo rol con permisos específicos.
      operationId: createRole
      tags:
        - Roles y Permisos
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Rol creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          description: Datos de rol inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                createRoleValidation:
                  summary: Error de creación de rol
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de creación de rol contiene errores en uno o más campos."
                    instance: "/roles"
                    invalid_params:
                      - name: "name_role"
                        reason: "El nombre del rol es requerido, debe tener entre 2 y 30 caracteres, y contener únicamente letras y espacios."
                      - name: "permission_ids"
                        reason: "Debe proveer una lista válida con al menos un ID de permiso (número entero positivo)."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /roles/{roleId}:
    put:
      summary: Editar un rol (Admin)
      description: Permite al administrador actualizar el nombre y los permisos de un rol existente.
      operationId: updateRole
      tags:
        - Roles y Permisos
      security:
        - BearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "200":
          description: Rol actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          description: Datos de rol inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                updateRoleValidation:
                  summary: Error de actualización de rol
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de actualización de rol contiene errores en uno o más campos."
                    instance: "/roles/1"
                    invalid_params:
                      - name: "name_role"
                        reason: "El nombre del rol es requerido, debe tener entre 2 y 30 caracteres, y contener únicamente letras y espacios."
                      - name: "permission_ids"
                        reason: "Debe proveer una lista válida con al menos un ID de permiso (número entero positivo)."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Eliminar un rol (Admin)
      description: Elimina un rol del sistema. No se puede eliminar un rol que tenga usuarios asignados.
      operationId: deleteRole
      tags:
        - Roles y Permisos
      security:
        - BearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Rol eliminado exitosamente
        "409":
          $ref: "#/components/responses/ConflictError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  DISPOSITIVOS (ESP32)
  # ═══════════════════════════════════════════
  /devices:
    get:
      summary: Listar dispositivos del usuario
      description: |
        Retorna la lista de dispositivos ESP32 vinculados al usuario autenticado.
        Si el usuario es administrador, retorna todos los dispositivos registrados en el sistema.
        Soporta paginación.
      operationId: getDevices
      tags:
        - Dispositivos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          description: Filtrar por estado de conectividad
          required: false
          schema:
            type: string
            enum: [ACTIVE, INACTIVE]
      responses:
        "200":
          description: Lista paginada de dispositivos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDevices"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Vincular un dispositivo ESP32
      description: |
        Vincula un nuevo dispositivo ESP32 a la cuenta del usuario autenticado.
        Se requiere la dirección MAC como identificador único del dispositivo.
        Permite asignar un nombre descriptivo (alias) al dispositivo.
      operationId: linkDevice
      tags:
        - Dispositivos
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkDeviceRequest"
      responses:
        "201":
          description: Dispositivo vinculado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Datos del dispositivo inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                linkDeviceValidation:
                  summary: Errores de vinculación de dispositivo
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de vinculación del dispositivo contiene errores en uno o más campos."
                    instance: "/devices"
                    invalid_params:
                      - name: "mac_address"
                        reason: "La dirección MAC es obligatoria y debe cumplir con el formato estándar de red de 6 pares de dígitos hexadecimales separados por dos puntos o guiones (ej. AA:BB:CC:DD:EE:FF)."
                      - name: "alias"
                        reason: "El alias del dispositivo es obligatorio, debe tener entre 2 y 80 caracteres y solo permite letras, números, espacios, puntos, comillas simples y guiones."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /devices/{deviceId}:
    get:
      summary: Obtener detalle de un dispositivo
      description: Retorna la información completa de un dispositivo específico, incluyendo su estado de conectividad y ángulo actual del panel.
      operationId: getDeviceById
      tags:
        - Dispositivos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      responses:
        "200":
          description: Detalle del dispositivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      summary: Actualizar alias del dispositivo
      description: Permite modificar el nombre descriptivo (alias) asignado al dispositivo.
      operationId: updateDevice
      tags:
        - Dispositivos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                  description: Nuevo nombre descriptivo para el dispositivo
                  example: "Panel Solar Techo Norte"
      responses:
        "200":
          description: Dispositivo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Alias inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                updateDeviceValidation:
                  summary: Error de alias del dispositivo
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de actualización del dispositivo contiene errores en uno o más campos."
                    instance: "/devices/1"
                    invalid_params:
                      - name: "alias"
                        reason: "El alias del dispositivo es obligatorio, debe tener entre 2 y 80 caracteres y solo permite letras, números, espacios, puntos, comillas simples y guiones."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Desvincular un dispositivo
      description: Desvincula un dispositivo ESP32 de la cuenta del usuario autenticado.
      operationId: unlinkDevice
      tags:
        - Dispositivos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      responses:
        "204":
          description: Dispositivo desvinculado exitosamente
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /devices/{deviceId}/tracking:
    patch:
      summary: Habilitar o deshabilitar seguimiento solar automático
      description: Activa o desactiva el modo de seguimiento solar automático para un dispositivo específico.
      operationId: toggleSolarTracking
      tags:
        - Dispositivos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enabled
              properties:
                enabled:
                  type: boolean
                  description: Activar (true) o desactivar (false) el seguimiento solar automático
                  example: true
      responses:
        "200":
          description: Modo de seguimiento actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Valor inválido para seguimiento automático
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                toggleTrackingValidation:
                  summary: Error de habilitación/deshabilitación
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud para cambiar el seguimiento automático contiene errores de validación."
                    instance: "/devices/1/tracking"
                    invalid_params:
                      - name: "enabled"
                        reason: "El estado del seguimiento debe ser un valor booleano (true o false)."
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  TELEMETRÍA
  # ═══════════════════════════════════════════
  /devices/{deviceId}/telemetry:
    get:
      summary: Obtener datos de telemetría en tiempo real
      description: |
        Retorna los datos de telemetría más recientes del dispositivo:
        voltaje (V), corriente (A), potencia (W), energía acumulada (Wh),
        ángulo actual del panel y nivel de batería.
      operationId: getDeviceTelemetry
      tags:
        - Telemetría
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      responses:
        "200":
          description: Datos de telemetría actuales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryData"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /devices/{deviceId}/telemetry/history:
    get:
      summary: Historial de telemetría con filtro de fechas
      description: |
        Retorna el historial de datos de telemetría almacenados para un dispositivo.
        Permite filtrar por rango de fechas. Los datos se almacenan en MongoDB.
      operationId: getTelemetryHistory
      tags:
        - Telemetría
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
        - name: startDate
          in: query
          description: Fecha de inicio del rango (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-06-01T00:00:00Z"
        - name: endDate
          in: query
          description: Fecha de fin del rango (ISO 8601)
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-06-20T23:59:59Z"
        - name: interval
          in: query
          description: Intervalo de agrupación de datos
          required: false
          schema:
            type: string
            enum: [hourly, daily, weekly, monthly]
            default: hourly
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Historial de telemetría
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TelemetryData"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Filtros de historial inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                telemetryHistoryValidation:
                  summary: Error de rango o intervalo
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "Los filtros de consulta del historial de telemetría contienen errores."
                    instance: "/devices/1/telemetry/history"
                    invalid_params:
                      - name: "startDate"
                        reason: "La fecha de inicio debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "endDate"
                        reason: "La fecha de fin debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "interval"
                        reason: "El intervalo de agrupación debe ser uno de: hourly, daily, weekly o monthly."
        "400":
          description: Filtros de historial o parámetro de ruta inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                telemetryHistoryBadRequest:
                  summary: Error de historial de telemetría
                  value:
                    type: "https://api.ojosdesol.com/errors/bad-request"
                    title: "Parámetro de Ruta o Consulta Inválido"
                    status: 400
                    detail: "Los filtros de consulta o el identificador de dispositivo contienen errores."
                    instance: "/devices/1/telemetry/history"
                    invalid_params:
                      - name: "deviceId"
                        reason: "El ID del dispositivo debe ser un UUID válido."
                      - name: "startDate"
                        reason: "La fecha de inicio debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "endDate"
                        reason: "La fecha de fin debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "interval"
                        reason: "El intervalo de agrupación debe ser uno de: hourly, daily, weekly o monthly."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /devices/{deviceId}/telemetry/summary:
    get:
      summary: Resumen de generación energética
      description: |
        Genera un resumen de la generación energética del dispositivo.
        Soporta resolución diaria, semanal y mensual.
        Incluye comparativa entre energía generada y energía consumida.
      operationId: getTelemetrySummary
      tags:
        - Telemetría
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
        - name: period
          in: query
          description: Período del resumen
          required: true
          schema:
            type: string
            enum: [today, weekly, monthly]
            example: today
      responses:
        "200":
          description: Resumen de generación energética
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnergySummary"
        "400":
          description: Parámetro de período inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                telemetrySummaryValidation:
                  summary: Error de resumen energético
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "El parámetro de consulta del resumen energético contiene errores."
                    instance: "/devices/1/telemetry/summary"
                    invalid_params:
                      - name: "period"
                        reason: "El período del resumen es obligatorio y debe ser uno de: today, weekly o monthly."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  COMANDOS (Control del Panel)
  # ═══════════════════════════════════════════
  /devices/{deviceId}/commands:
    get:
      summary: Historial de comandos enviados
      description: |
        Retorna el historial de comandos enviados al servomotor del panel solar,
        con su estado de entrega (QUEUED, DELIVERED, REJECTED). Soporta paginación.
      operationId: getDeviceCommands
      tags:
        - Comandos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
        - name: status
          in: query
          description: Filtrar por estado de entrega
          required: false
          schema:
            type: string
            enum: [QUEUED, DELIVERED, REJECTED]
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Historial de comandos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Command"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Filtros de comandos o ID de dispositivo inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                commandsBadRequest:
                  summary: Error de historial de comandos
                  value:
                    type: "https://api.ojosdesol.com/errors/bad-request"
                    title: "Parámetro de Ruta o Consulta Inválido"
                    status: 400
                    detail: "Los filtros de consulta o el identificador de dispositivo contienen errores."
                    instance: "/devices/1/commands"
                    invalid_params:
                      - name: "deviceId"
                        reason: "El ID del dispositivo debe ser un UUID válido."
                      - name: "status"
                        reason: "El estado de entrega debe ser uno de: QUEUED, DELIVERED o REJECTED."
                      - name: "page"
                        reason: "El número de página debe ser un entero mayor o igual a 1."
                      - name: "limit"
                        reason: "La cantidad de registros por página debe ser un entero entre 1 y 100."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Enviar comando manual de ángulo al panel
      description: |
        Permite al usuario enviar un comando de ángulo (en grados) al servomotor del panel solar.
        El comando se encola para entrega y se registra con estado de seguimiento.
      operationId: sendCommand
      tags:
        - Comandos
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCommandRequest"
      responses:
        "201":
          description: Comando encolado para entrega
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Command"
        "400":
          description: Comando inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sendCommandValidation:
                  summary: Error de comando manual
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de comando contiene errores en uno o más campos."
                    instance: "/devices/1/commands"
                    invalid_params:
                      - name: "topic"
                        reason: "El tópico MQTT especificado para enviar el comando no puede superar los 250 caracteres de longitud."
                      - name: "message.angle_deg"
                        reason: "El ángulo de comando enviado al servomotor del panel solar debe estar obligatoriamente entre 0 y 360 grados."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  ALERTAS Y NOTIFICACIONES
  # ═══════════════════════════════════════════
  /alerts:
    get:
      summary: Listar alertas del usuario
      description: |
        Retorna las alertas generadas para los dispositivos del usuario autenticado.
        Tipos de alerta:
        - Baja generación energética respecto al promedio histórico.
        - Nivel de batería superior al 95% (corte de carga activado).
        - Pérdida de conectividad del dispositivo por más de 10 minutos.
      operationId: getAlerts
      tags:
        - Alertas y Notificaciones
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          description: Filtrar por tipo de alerta
          required: false
          schema:
            type: string
            enum: [LOW_GENERATION, BATTERY_OVERCHARGE, CONNECTIVITY_LOSS]
        - name: acknowledged
          in: query
          description: Filtrar por estado de reconocimiento
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Lista de alertas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Alert"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Filtros de alertas inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alertsValidation:
                  summary: Error de filtros de alerta
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "Los filtros de consulta de alertas contienen errores."
                    instance: "/alerts"
                    invalid_params:
                      - name: "type"
                        reason: "El tipo de alerta debe ser uno de: LOW_GENERATION, BATTERY_OVERCHARGE o CONNECTIVITY_LOSS."
                      - name: "acknowledged"
                        reason: "El filtro acknowledged debe ser un valor booleano."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /alerts/{alertId}/acknowledge:
    patch:
      summary: Reconocer una alerta
      description: Marca una alerta como reconocida/leída por el usuario.
      operationId: acknowledgeAlert
      tags:
        - Alertas y Notificaciones
      security:
        - BearerAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Alerta reconocida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "400":
          description: Identificador de alerta inválido
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                acknowledgeAlertPathValidation:
                  summary: ID de alerta inválido
                  value:
                    type: "https://api.ojosdesol.com/errors/bad-request"
                    title: "Identificador NoSQL Inválido"
                    status: 400
                    detail: "El identificador de alerta en la URL debe ser un ID de MongoDB válido (ObjectId de 24 caracteres hexadecimales)."
                    instance: "/alerts/12345/acknowledge"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /notifications/push/register:
    post:
      summary: Registrar token de notificaciones push
      description: Registra el token del dispositivo móvil para recibir notificaciones push cuando se genere una alerta.
      operationId: registerPushToken
      tags:
        - Alertas y Notificaciones
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - platform
              properties:
                token:
                  type: string
                  description: Token de notificación push (FCM/APNs)
                  example: "dGhpcyBpcyBhIHRlc3QgdG9rZW4..."
                platform:
                  type: string
                  enum: [IOS, ANDROID]
                  description: Plataforma del dispositivo móvil
                  example: "IOS"
      responses:
        "200":
          description: Token registrado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Token de notificaciones push registrado correctamente"
        "400":
          description: Token o plataforma inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                pushTokenValidation:
                  summary: Error de registro de push token
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud para registrar el token de notificaciones push contiene errores."
                    instance: "/notifications/push/register"
                    invalid_params:
                      - name: "token"
                        reason: "El token de notificación push es obligatorio."
                      - name: "platform"
                        reason: "La plataforma debe ser IOS o ANDROID."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  HORARIOS DE OPERACIÓN
  # ═══════════════════════════════════════════
  /devices/{deviceId}/schedules:
    get:
      summary: Listar horarios de un dispositivo
      description: Retorna todos los horarios de operación configurados para un dispositivo específico.
      operationId: getDeviceSchedules
      tags:
        - Horarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      responses:
        "200":
          description: Lista de horarios configurados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Crear horario de operación
      description: Programa un nuevo horario de operación (hora inicio y hora fin) para un dispositivo.
      operationId: createSchedule
      tags:
        - Horarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "201":
          description: Horario creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          description: Datos del horario inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                createScheduleValidation:
                  summary: Error de horario de operación
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de creación de horario contiene errores en uno o más campos."
                    instance: "/devices/1/schedules"
                    invalid_params:
                      - name: "label"
                        reason: "La etiqueta o nombre descriptivo del horario es obligatoria y no puede exceder los 100 caracteres."
                      - name: "start_time"
                        reason: "La hora de inicio de la programación debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "end_time"
                        reason: "La hora de finalización debe tener un formato de fecha y hora ISO 8601 y ser lógicamente posterior a la fecha y hora de inicio."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          description: Regla de negocio de horario no cumplida
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                createScheduleBusinessRule:
                  summary: Error semántico de horario
                  value:
                    type: "https://api.ojosdesol.com/errors/unprocessable-entity"
                    title: "Entidad no Procesable"
                    status: 422
                    detail: "El horario propuesto no cumple con las reglas de negocio."
                    instance: "/devices/1/schedules"
                    invalid_params:
                      - name: "end_time"
                        reason: "La hora de finalización debe tener un formato de fecha y hora ISO 8601 y ser lógicamente posterior a la fecha y hora de inicio."
        "500":
          $ref: "#/components/responses/InternalServerError"

  /devices/{deviceId}/schedules/{scheduleId}:
    put:
      summary: Editar horario de operación
      description: Modifica un horario de operación existente para un dispositivo.
      operationId: updateSchedule
      tags:
        - Horarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "200":
          description: Horario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "400":
          description: Datos del horario inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                updateScheduleValidation:
                  summary: Error de actualización de horario
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de actualización de horario contiene errores en uno o más campos."
                    instance: "/devices/1/schedules/1"
                    invalid_params:
                      - name: "label"
                        reason: "La etiqueta o nombre descriptivo del horario es obligatoria y no puede exceder los 100 caracteres."
                      - name: "start_time"
                        reason: "La hora de inicio de la programación debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "end_time"
                        reason: "La hora de finalización debe tener un formato de fecha y hora ISO 8601 y ser lógicamente posterior a la fecha y hora de inicio."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          description: Regla de negocio de horario no cumplida
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                updateScheduleBusinessRule:
                  summary: Error semántico de horario
                  value:
                    type: "https://api.ojosdesol.com/errors/unprocessable-entity"
                    title: "Entidad no Procesable"
                    status: 422
                    detail: "El horario actualizado no cumple con las reglas de negocio."
                    instance: "/devices/1/schedules/1"
                    invalid_params:
                      - name: "end_time"
                        reason: "La hora de finalización debe tener un formato de fecha y hora ISO 8601 y ser lógicamente posterior a la fecha y hora de inicio."
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      summary: Eliminar horario de operación
      description: Elimina un horario de operación programado para un dispositivo.
      operationId: deleteSchedule
      tags:
        - Horarios
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Horario eliminado
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  CONFIGURACIÓN DE UMBRALES DE ALERTA
  # ═══════════════════════════════════════════
  /devices/{deviceId}/alert-settings:
    get:
      summary: Obtener configuración de umbrales de alerta
      description: Retorna los umbrales de alerta configurados para un dispositivo (nivel de batería, rendimiento mínimo).
      operationId: getAlertSettings
      tags:
        - Alertas y Notificaciones
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      responses:
        "200":
          description: Configuración de umbrales de alerta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSettings"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      summary: Configurar umbrales de alerta
      description: Permite al usuario configurar los umbrales personalizados de alertas para un dispositivo.
      operationId: updateAlertSettings
      tags:
        - Alertas y Notificaciones
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertSettings"
      responses:
        "200":
          description: Configuración de umbrales actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSettings"
        "400":
          description: Umbrales de alerta inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alertSettingsValidation:
                  summary: Error de configuración de alertas
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La configuración de umbrales contiene errores en uno o más campos."
                    instance: "/devices/1/alert-settings"
                    invalid_params:
                      - name: "battery_overcharge_threshold"
                        reason: "El umbral de sobrecarga de la batería debe establecerse en un valor porcentual de entre el 50% y el 100%."
                      - name: "min_generation_threshold_percent"
                        reason: "El umbral mínimo de generación energética debe estar configurado entre el 10% y el 100% de la media histórica."
                      - name: "connectivity_timeout_minutes"
                        reason: "El tiempo de tolerancia para desconexión del dispositivo debe ser un entero de entre 1 y 60 minutos."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          description: Umbrales fuera de rango
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alertSettingsBusinessRule:
                  summary: Error semántico de umbrales
                  value:
                    type: "https://api.ojosdesol.com/errors/unprocessable-entity"
                    title: "Entidad no Procesable"
                    status: 422
                    detail: "Los umbrales de alerta configurados no cumplen con las reglas de negocio."
                    instance: "/devices/1/alert-settings"
                    invalid_params:
                      - name: "battery_overcharge_threshold"
                        reason: "El umbral de sobrecarga de la batería debe establecerse en un valor porcentual de entre el 50% y el 100%."
                      - name: "min_generation_threshold_percent"
                        reason: "El umbral mínimo de generación energética debe estar configurado entre el 10% y el 100% de la media histórica."
                      - name: "connectivity_timeout_minutes"
                        reason: "El tiempo de tolerancia para desconexión del dispositivo debe ser un entero de entre 1 y 60 minutos."
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  REPORTES
  # ═══════════════════════════════════════════
  /devices/{deviceId}/reports/energy:
    get:
      summary: Exportar resumen de generación energética en PDF
      description: |
        Genera y descarga un reporte PDF con el resumen de generación energética
        del dispositivo para el rango de fechas especificado.
      operationId: exportEnergyReport
      tags:
        - Reportes
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceIdParam"
        - name: startDate
          in: query
          description: Fecha de inicio del reporte
          required: true
          schema:
            type: string
            format: date
            example: "2026-06-01"
        - name: endDate
          in: query
          description: Fecha de fin del reporte
          required: true
          schema:
            type: string
            format: date
            example: "2026-06-30"
      responses:
        "200":
          description: Archivo PDF generado
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Fechas del reporte inválidas
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                energyReportValidation:
                  summary: Error de exportación de reporte
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "La solicitud de exportación del reporte contiene errores en uno o más parámetros."
                    instance: "/devices/1/reports/energy"
                    invalid_params:
                      - name: "startDate"
                        reason: "La fecha de inicio del reporte debe tener un formato válido de fecha ISO 8601 (YYYY-MM-DD)."
                      - name: "endDate"
                        reason: "La fecha de fin del reporte debe tener un formato válido de fecha ISO 8601 (YYYY-MM-DD)."
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ═══════════════════════════════════════════
  #  AUDITORÍA
  # ═══════════════════════════════════════════
  /audit-logs:
    get:
      summary: Consultar log de auditoría
      description: |
        Retorna el registro de actividad de acceso y acciones realizadas por los usuarios del sistema.
        Solo accesible por administradores. Soporta paginación y filtros por usuario y rango de fechas.
      operationId: getAuditLogs
      tags:
        - Auditoría
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: query
          description: Filtrar logs por usuario específico
          required: false
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          description: Filtrar por tipo de acción
          required: false
          schema:
            type: string
            enum:
              [
                LOGIN,
                LOGOUT,
                CREATE,
                UPDATE,
                DELETE,
                COMMAND_SENT,
                DEVICE_LINKED,
                DEVICE_UNLINKED,
              ]
        - name: startDate
          in: query
          description: Fecha de inicio del filtro
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: Fecha de fin del filtro
          required: false
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Log de auditoría
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "400":
          description: Filtros de auditoría inválidos
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                auditLogsValidation:
                  summary: Error de filtros de auditoría
                  value:
                    type: "https://api.ojosdesol.com/errors/validation-error"
                    title: "Error de Validación"
                    status: 400
                    detail: "Los filtros de consulta del log de auditoría contienen errores."
                    instance: "/audit-logs"
                    invalid_params:
                      - name: "userId"
                        reason: "El identificador de usuario debe ser un número entero válido o un UUID válido según el parámetro definido."
                      - name: "action"
                        reason: "La acción debe pertenecer al catálogo permitido de auditoría."
                      - name: "startDate"
                        reason: "La fecha de inicio debe tener un formato válido de fecha y hora ISO 8601."
                      - name: "endDate"
                        reason: "La fecha de fin debe tener un formato válido de fecha y hora ISO 8601."
        "500":
          $ref: "#/components/responses/InternalServerError"

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────
components:
  # ═══ SECURITY SCHEMES ═══
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido al iniciar sesión. Todas las comunicaciones se realizan sobre HTTPS/TLS 1.2+.

  # ═══ RESPONSES ═══
  responses:
    BadRequestError:
      description: Petición incorrecta o parámetros mal formados
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            badRequest:
              summary: Error de sintaxis o validación de ruta/query
              value:
                type: "https://api.ojosdesol.com/problems/client-bad-request"
                title: "Solicitud incorrecta"
                status: 400
                detail: "The request body contains invalid or malformed JSON syntax."
                instance: "/auth/register"
                code: "CLIENT_BAD_REQUEST"
                technical_detail: "Unexpected token '}' at position 142 in request body."
                user_message: "La solicitud no pudo procesarse. Verifica los datos enviados e intenta de nuevo."

    UnauthorizedError:
      description: Falta autenticación o el token es inválido/expiró
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthorized:
              summary: Token ausente o inválido
              value:
                type: "https://api.ojosdesol.com/problems/client-unauthorized"
                title: "No autorizado"
                status: 401
                detail: "The request requires a valid authentication token."
                instance: "/devices"
                code: "CLIENT_UNAUTHORIZED"
                technical_detail: "Authorization header is missing or the JWT token has expired. Token exp: 2026-06-17T10:00:00Z"
                user_message: "Tu sesión ha expirado. Por favor inicia sesión nuevamente."

    AccountLockedError:
      description: La cuenta del usuario está bloqueada temporalmente por demasiados intentos fallidos
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            accountLocked:
              summary: Usuario bloqueado
              value:
                type: "https://api.ojosdesol.com/problems/client-account-locked"
                title: "Cuenta bloqueada"
                status: 423
                detail: "The account is temporarily locked due to too many failed authentication attempts."
                instance: "/auth/login"
                code: "CLIENT_ACCOUNT_LOCKED"
                technical_detail: "auth_attemps reached system_configuration.lockout threshold. Locked until 2026-06-24T13:00:00Z."
                user_message: "Tu cuenta está bloqueada temporalmente. Intenta más tarde o contacta a soporte."

    ForbiddenError:
      description: El usuario no tiene permisos suficientes
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              summary: Acceso prohibido por rol
              value:
                type: "https://api.ojosdesol.com/problems/client-forbidden"
                title: "Acceso denegado"
                status: 403
                detail: "The authenticated user does not have permission to access this resource."
                instance: "/users"
                code: "CLIENT_FORBIDDEN"
                technical_detail: "User ID 482 with role 'customer' attempted to access admin-only endpoint."
                user_message: "No tienes permisos para realizar esta acción."

    NotFoundError:
      description: El recurso solicitado no existe
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              summary: Recurso inexistente
              value:
                type: "https://api.ojosdesol.com/problems/client-not-found"
                title: "Recurso no encontrado"
                status: 404
                detail: "The requested resource does not exist or the ID provided is invalid."
                instance: "/devices/99"
                code: "CLIENT_NOT_FOUND"
                technical_detail: "Order with ID 987 not found in database. Table: orders."
                user_message: "El recurso solicitado no existe. Verifica la información e intenta de nuevo."

    ConflictError:
      description: El recurso entra en conflicto con un registro existente
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            conflict:
              summary: Dato duplicado
              value:
                type: "https://api.ojosdesol.com/problems/client-conflict"
                title: "Conflicto de Datos"
                status: 409
                detail: "El recurso que intenta crear entra en conflicto con un registro existente (ej. email o dirección MAC ya registrados)."
                instance: "/devices"
                code: "CLIENT_CONFLICT"
                technical_detail: "Unique constraint violated on field 'email'."
                user_message: "El recurso ya existe o entra en conflicto con otro registro."

    ValidationError:
      description: La solicitud es válida sintácticamente pero falló una o más validaciones de negocio o de campos
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validationError:
              summary: Error con detalles por campo
              value:
                type: "https://api.ojosdesol.com/problems/client-validation-error"
                title: "Error de Validación"
                status: 422
                detail: "The request contains fields with invalid or missing values."
                instance: "/auth/register"
                code: "CLIENT_VALIDATION_ERROR"
                technical_detail: "Validation failed for fields: 'username', 'password'."
                user_message: "Algunos campos contienen errores. Por favor revísalos e intenta de nuevo."
                errors:
                  - detail: "El nombre de usuario debe tener entre 3 y 20 caracteres y contener únicamente letras, números, puntos (.) o guiones bajos (_)."
                    pointer: "/username"
                  - detail: "La contraseña debe tener una longitud mínima de 8 caracteres."
                    pointer: "/password"

    UnprocessableEntityError:
      description: La petición viola una regla de negocio
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unprocessableEntity:
              summary: Validación semántica
              value:
                type: "https://api.ojosdesol.com/problems/client-validation-error"
                title: "Entidad no Procesable"
                status: 422
                detail: "The request contains fields with invalid or missing values."
                instance: "/devices/1/schedules"
                code: "CLIENT_VALIDATION_ERROR"
                technical_detail: "Validation failed for fields: 'end_time'."
                user_message: "Algunos campos contienen errores. Por favor revísalos e intenta de nuevo."
                errors:
                  - detail: "La fecha/hora de finalización no puede ser anterior o igual a la fecha/hora de inicio."
                    pointer: "/end_time"

    InternalServerError:
      description: Error inesperado del servidor
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internalServerError:
              summary: Error inesperado
              value:
                type: "https://api.ojosdesol.com/problems/internal-unhandled-exception"
                title: "Fallo Interno del Servidor"
                status: 500
                detail: "An unhandled exception occurred while processing the request."
                instance: "/health"
                code: "INTERNAL_UNHANDLED_EXCEPTION"
                technical_detail: "TypeError: Cannot read property 'id' of undefined at ShipmentController.php:58"
                user_message: "Algo salió mal de nuestro lado. Ya estamos trabajando en solucionarlo."

    ServiceUnavailableError:
      description: El servicio no puede atender temporalmente la solicitud
      headers:
        Retry-After:
          description: Cantidad de segundos después de los cuales el cliente puede reintentar.
          schema:
            type: integer
            example: 30
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            serviceUnavailable:
              summary: Servicio saturado o no disponible
              value:
                type: "https://api.ojosdesol.com/problems/internal-service-unavailable"
                title: "Servicio no disponible"
                status: 503
                detail: "The service is temporarily unable to handle the request."
                instance: "/api/v1/orders/create"
                code: "INTERNAL_SERVICE_UNAVAILABLE"
                technical_detail: "Database connection pool exhausted. Active connections: 100/100"
                user_message: "El servicio no está disponible en este momento. Por favor intenta más tarde."

    ServiceMaintenanceError:
      description: El servicio está en mantenimiento programado
      headers:
        Retry-After:
          description: Cantidad de segundos después de los cuales el cliente puede reintentar.
          schema:
            type: integer
            example: 30
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            serviceMaintenance:
              summary: Servicio en mantenimiento
              value:
                type: "https://api.ojosdesol.com/problems/internal-service-unavailable"
                title: "Servicio en mantenimiento"
                status: 503
                detail: "The service is currently undergoing scheduled maintenance."
                instance: "/api/v1/orders/create"
                code: "INTERNAL_SERVICE_UNAVAILABLE_BY_MAINTENANCE"
                technical_detail: "Scheduled maintenance window: 2026-06-19T02:00:00Z - 2026-06-19T04:00:00Z"
                user_message: "Estamos realizando mantenimiento. El servicio estará disponible a partir del 19 de Junio a las 12:00."

    PathParameterError:
      description: El identificador de ruta no tiene el formato esperado
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidPathParam:
              summary: Identificador inválido en la URL
              value:
                type: "https://api.ojosdesol.com/errors/bad-request"
                title: "Parámetro de Ruta Inválido"
                status: 400
                detail: "El parámetro identificador en la URL debe ser un número entero válido (SMALLINT)."
                instance: "/users/carlos"

  # ═══ PARAMETERS ═══
  parameters:
    PageParam:
      name: page
      in: query
      description: Número de página (1-indexed)
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1

    LimitParam:
      name: limit
      in: query
      description: Cantidad de registros por página
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20

    UserIdParam:
      name: userId
      in: path
      required: true
      description: ID único del usuario
      schema:
        type: string
        format: uuid

    DeviceIdParam:
      name: deviceId
      in: path
      required: true
      description: ID único del dispositivo ESP32
      schema:
        type: string
        format: uuid

  # ═══ SCHEMAS ═══
  schemas:
    # ───────────────────────────────────────────
    # SQL: Autenticación
    # ───────────────────────────────────────────
    RegisterRequest:
      type: object
      required:
        - username
        - name
        - last_name
        - birth_date
        - email
        - password
        - role_id
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_.]{3,20}$"
          description: Nombre de usuario; letras, números, punto y guión bajo.
          example: "carlos.mendez"
        name:
          type: string
          maxLength: 50
          description: Nombre(s) del usuario.
          example: "Carlos"
        last_name:
          type: string
          maxLength: 70
          description: Apellido(s) del usuario.
          example: "Méndez Gómez"
        birth_date:
          type: string
          format: date
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: Fecha de nacimiento (ISO 8601).
          example: "1995-08-15"
        phone:
          type: string
          maxLength: 20
          pattern: "^\\+?[0-9\\s\\-().]{7,20}$"
          description: Número de teléfono opcional.
          example: "+52 55 1234 5678"
        email:
          type: string
          format: email
          maxLength: 80
          pattern: "^[\\w.+-]+@[\\w-]+\\.[a-zA-Z]{2,}$"
          description: Correo electrónico válido del usuario.
          example: "carlos.mendez@ojosdesol.com"
        password:
          type: string
          format: password
          minLength: 8
          description: Se almacena como hash bcrypt con factor de costo mínimo de 10.
          example: "ContraseñaSegura123!"
        role_id:
          type: integer
          description: "ID del rol asignado al usuario (FK → roles.id)."
          example: 2

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "carlos.mendez@ojosdesol.com"
        password:
          type: string
          format: password
          example: "ContraseñaSegura123!"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT para autenticación.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/User"

    TwoFactorChallengeResponse:
      type: object
      required:
        - message
        - email_masked
        - expires_in_seconds
      properties:
        message:
          type: string
          description: Mensaje para informar al usuario que el código fue enviado por correo.
          example: "Se ha enviado un código de verificación a tu correo registrado."
        email_masked:
          type: string
          description: Destino parcialmente oculto para mostrar al usuario.
          example: "c*****@ojosdesol.com"
        expires_in_seconds:
          type: integer
          description: Tiempo de vida del desafío en segundos.
          example: 300

    TwoFactorVerifyRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
          description: Correo electrónico del usuario que recibió el OTP.
          example: "usuario@ojosdesol.com"
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: Código de 6 dígitos recibido por el usuario.
          example: "483921"

    TwoFactorResendRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          description: Correo electrónico al que se reenvía el OTP.
          example: "usuario@ojosdesol.com"

    # ───────────────────────────────────────────
    # SQL: Tabla users
    # ───────────────────────────────────────────
    User:
      type: object
      description: "Almacena los usuarios registrados en el sistema. Cada usuario tiene un rol asignado y un perfil con datos personales."
      properties:
        id:
          type: integer
          description: Identificador único del usuario (PK, AUTO_INCREMENT).
          example: 1
        role_id:
          type: integer
          description: "Rol asignado al usuario (FK → roles.id)."
          example: 2
        profile_id:
          type: integer
          description: "Perfil asociado al usuario (FK → profiles.id)."
          example: 1
        auth_code:
          type: string
          maxLength: 6
          nullable: true
          description: Código de autenticación OTP de 6 dígitos. Nulo cuando no está en proceso de 2FA.
          example: "483921"
        auth_attemps:
          type: integer
          minimum: 0
          description: Contador de intentos fallidos de autenticación.
          example: 0
        profile:
          $ref: "#/components/schemas/Profile"
        device_count:
          type: integer
          minimum: 0
          description: Cantidad de dispositivos asociados al usuario.
          example: 3
        is_active:
          type: boolean
          description: "TRUE = cuenta activa; FALSE = deshabilitada."
          default: true
          example: true
        created_at:
          type: string
          format: date-time
          description: Fecha y hora UTC de creación.
          example: "2026-06-20T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Fecha y hora UTC de última actualización.
          example: "2026-06-24T15:30:00Z"

    Profile:
      type: object
      description: "Datos personales y de contacto asociados al usuario."
      properties:
        id:
          type: integer
          description: Identificador único del perfil.
          example: 1
        name:
          type: string
          maxLength: 50
          example: "Carlos"
        paternal_surname:
          type: string
          maxLength: 50
          example: "Méndez"
        maternal_surname:
          type: string
          maxLength: 50
          example: "Gómez"
        email:
          type: string
          format: email
          maxLength: 80
          example: "carlos.mendez@ojosdesol.com"
        phone:
          type: string
          maxLength: 20
          nullable: true
          example: "+52 55 1234 5678"
        street:
          type: string
          maxLength: 60
          nullable: true
          example: "Av. Insurgentes Sur 1234"
        locality:
          type: string
          maxLength: 60
          nullable: true
          example: "Del Valle"
        postal_code:
          type: string
          maxLength: 5
          nullable: true
          example: "03100"
        city:
          type: string
          maxLength: 60
          nullable: true
          example: "Ciudad de México"
        state:
          type: string
          maxLength: 60
          nullable: true
          example: "CDMX"

    CreateUserRequest:
      type: object
      required:
        - email
        - password
        - role_id
        - name
        - paternal_surname
        - maternal_surname
      properties:
        email:
          type: string
          format: email
          maxLength: 80
          description: Correo electrónico del usuario (se almacena en profiles).
          example: "ana.garcia@ojosdesol.com"
        password:
          type: string
          format: password
          minLength: 8
          description: Se almacena como hash bcrypt con factor de costo mínimo de 10.
          example: "Password123!"
        role_id:
          type: integer
          description: "ID del rol asignado (FK → roles.id)."
          example: 2
        name:
          type: string
          maxLength: 50
          description: Nombre del usuario.
          example: "Ana"
        paternal_surname:
          type: string
          maxLength: 50
          description: Apellido paterno.
          example: "García"
        maternal_surname:
          type: string
          maxLength: 50
          description: Apellido materno.
          example: "López"
        phone:
          type: string
          maxLength: 20
          nullable: true
          description: Número de teléfono opcional.
          example: "+52 33 9876 5432"
        street:
          type: string
          maxLength: 60
          nullable: true
          description: Calle y número.
          example: "Av. Reforma 1234"
        locality:
          type: string
          maxLength: 60
          nullable: true
          description: Localidad o colonia.
          example: "Benito Juárez"
        postal_code:
          type: string
          maxLength: 5
          nullable: true
          description: Código postal.
          example: "06500"
        city:
          type: string
          maxLength: 60
          nullable: true
          description: Ciudad.
          example: "Ciudad de México"
        state:
          type: string
          maxLength: 60
          nullable: true
          description: Estado o provincia.
          example: "CDMX"

    UpdateUserRequest:
      type: object
      properties:
        role_id:
          type: integer
          description: "ID del rol asignado (FK → roles.id)."
          example: 2
        name:
          type: string
          maxLength: 50
          description: Nombre del usuario.
          example: "Ana María"
        paternal_surname:
          type: string
          maxLength: 50
          description: Apellido paterno.
          example: "García"
        maternal_surname:
          type: string
          maxLength: 50
          description: Apellido materno.
          example: "López"
        phone:
          type: string
          maxLength: 20
          nullable: true
          description: Número de teléfono.
          example: "+52 33 9876 5432"
        street:
          type: string
          maxLength: 60
          nullable: true
          example: "Av. Reforma 1234"
        locality:
          type: string
          maxLength: 60
          nullable: true
          example: "Benito Juárez"
        postal_code:
          type: string
          maxLength: 5
          nullable: true
          example: "06500"
        city:
          type: string
          maxLength: 60
          nullable: true
          example: "Ciudad de México"
        state:
          type: string
          maxLength: 60
          nullable: true
          example: "CDMX"

    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"

    DashboardMetrics:
      type: object
      description: "Métricas agregadas para el panel administrativo."
      properties:
        registered_clients:
          type: integer
          minimum: 0
          description: Número total de clientes registrados.
          example: 128
        active_panels:
          type: integer
          minimum: 0
          description: Número total de paneles activos.
          example: 94
        admin_users:
          type: integer
          minimum: 0
          description: Número de usuarios con rol administrador.
          example: 3
        support_users:
          type: integer
          minimum: 0
          description: Número de usuarios con rol soporte.
          example: 2
        total_energy_generated_wh:
          type: number
          minimum: 0
          description: Energía total generada en Wh.
          example: 125430.75
        average_voltage_v:
          type: number
          description: Voltaje promedio total en V.
          example: 12.48
        average_current_a:
          type: number
          description: Corriente promedio total en A.
          example: 2.31
        generated_at:
          type: string
          format: date-time
          description: Momento de generación de la métrica.
          example: "2026-06-24T12:00:00Z"

    SystemConfiguration:
      type: object
      description: "Configuración global de seguridad para lockout e intentos de autenticación."
      properties:
        id:
          type: integer
          example: 1
        lockout:
          type: integer
          minimum: 1
          description: Duración del bloqueo de cuenta en minutos.
          example: 15
        auth_attemps:
          type: integer
          minimum: 1
          description: Número máximo de intentos fallidos permitidos antes del bloqueo.
          example: 5
        updated_at:
          type: string
          format: date-time
          example: "2026-06-24T12:00:00Z"

    UpdateSystemConfigurationRequest:
      type: object
      properties:
        lockout:
          type: integer
          minimum: 1
          description: Duración del bloqueo de cuenta en minutos.
          example: 15
        auth_attemps:
          type: integer
          minimum: 1
          description: Número máximo de intentos fallidos permitidos antes del bloqueo.
          example: 5

    # ───────────────────────────────────────────
    # SQL: Tabla roles
    # ───────────────────────────────────────────
    Role:
      type: object
      description: "Catálogo de roles disponibles en el sistema (ej. Administrador, Cliente)."
      properties:
        id:
          type: integer
          description: Identificador único del rol (PK, AUTO_INCREMENT).
          example: 1
        name_role:
          type: string
          maxLength: 30
          pattern: "^[a-zA-ZáéíóúÁÉÍÓÚ\\s]{2,30}$"
          description: Nombre descriptivo del rol.
          example: "Administrador"
        permissions:
          type: array
          description: Lista de permisos asociados al rol (relación M:N vía role_permissions).
          items:
            $ref: "#/components/schemas/Permission"
        created_at:
          type: string
          format: date-time
          description: Fecha y hora UTC de creación.
          example: "2026-06-01T00:00:00Z"

    CreateRoleRequest:
      type: object
      required:
        - name_role
        - permission_ids
      properties:
        name_role:
          type: string
          maxLength: 30
          pattern: "^[a-zA-ZáéíóúÁÉÍÓÚ\\s]{2,30}$"
          description: Nombre descriptivo del rol.
          example: "Operador"
        permission_ids:
          type: array
          description: Lista de IDs de permisos a asociar al rol.
          items:
            type: integer
          example: [1, 3, 5, 7]

    # ───────────────────────────────────────────
    # SQL: Tabla permissions
    # ───────────────────────────────────────────
    Permission:
      type: object
      description: "Define los permisos del sistema por módulo, submódulo y acción disponible."
      properties:
        id:
          type: integer
          description: Identificador único del permiso (PK, AUTO_INCREMENT).
          example: 1
        module:
          type: string
          maxLength: 100
          description: Nombre del módulo funcional.
          example: "Dispositivos"
        submodule:
          type: string
          maxLength: 100
          nullable: true
          description: Nombre del submódulo (si aplica).
          example: "Telemetría"
        action:
          type: string
          enum: [create, read, update, delete]
          description: Acción permitida.
          example: "read"
        created_at:
          type: string
          format: date-time
          description: Fecha y hora UTC de creación.
          example: "2026-06-01T00:00:00Z"

    # ───────────────────────────────────────────
    # SQL: Tabla role_permissions (ACCESS TO - Pivote M:N)
    # ───────────────────────────────────────────
    RolePermission:
      type: object
      description: "Tabla pivote M:N que asocia roles con permisos. Define qué acciones puede ejecutar cada rol."
      properties:
        id:
          type: integer
          description: Identificador único del registro (PK, AUTO_INCREMENT).
          example: 1
        role_id:
          type: integer
          description: "Rol al que aplica el permiso (FK → roles.id)."
          example: 1
        permission_id:
          type: integer
          description: "Permiso asociado al rol (FK → permissions.id)."
          example: 3

    # ───────────────────────────────────────────
    # SQL: Tabla devices
    # ───────────────────────────────────────────
    Device:
      type: object
      description: "Registra los dispositivos (paneles solares) asignados a cada usuario."
      properties:
        id:
          type: integer
          description: Identificador único del dispositivo (PK, AUTO_INCREMENT).
          example: 1
        user_id:
          type: integer
          description: "Propietario del dispositivo (FK → users.id)."
          example: 1
        alias:
          type: string
          maxLength: 80
          pattern: "^[\\w\\s.'-]{2,80}$"
          description: Nombre descriptivo asignado por el usuario.
          example: "Panel Solar Techo Norte"
        mac_address:
          type: string
          maxLength: 17
          pattern: "^([0-9A-Fa-f]{2}[:\\-]){5}[0-9A-Fa-f]{2}$"
          description: Dirección MAC del dispositivo ESP32 (identificador único).
          example: "AA:BB:CC:DD:EE:FF"
        status:
          type: string
          enum: [active, inactive]
          description: Estado operativo del dispositivo.
          default: inactive
          example: "active"
        auto_tracking:
          type: boolean
          description: "TRUE = seguimiento solar automático habilitado."
          default: false
          example: true
        created_at:
          type: string
          format: date-time
          description: Fecha y hora UTC de registro.
          example: "2026-06-15T08:00:00Z"

    LinkDeviceRequest:
      type: object
      required:
        - mac_address
        - alias
      properties:
        mac_address:
          type: string
          maxLength: 17
          pattern: "^([0-9A-Fa-f]{2}[:\\-]){5}[0-9A-Fa-f]{2}$"
          description: Dirección MAC del dispositivo ESP32.
          example: "AA:BB:CC:DD:EE:FF"
        alias:
          type: string
          maxLength: 80
          pattern: "^[\\w\\s.'-]{2,80}$"
          description: Nombre descriptivo para el dispositivo.
          example: "Panel Solar Techo Norte"

    PaginatedDevices:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Device"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ───────────────────────────────────────────
    # NoSQL: Colección device_telemetry
    # ───────────────────────────────────────────
    TelemetryData:
      type: object
      description: "Registro de telemetría en tiempo real del dispositivo ESP32. Almacenado en MongoDB."
      properties:
        _id:
          type: string
          description: Identificador único del registro (ObjectId de MongoDB).
          example: "667575a0e4b0f12345abcdef"
        device_id:
          type: integer
          description: Identificador del dispositivo asociado.
          example: 1
        energy_in_wh:
          type: number
          minimum: 0
          description: Energía acumulada de entrada en Wh.
          example: 1250.75
        energy_out_wh:
          type: number
          minimum: 0
          description: Energía acumulada de salida en Wh.
          example: 980.30
        voltage_v:
          type: number
          minimum: 0
          maximum: 30
          description: Voltaje medido en volts.
          example: 12.45
        current_a:
          type: number
          minimum: 0
          description: Corriente medida en amperes.
          example: 2.35
        watts_now:
          type: number
          minimum: 0
          description: Potencia instantánea en watts.
          example: 29.26
        current_angle_deg:
          type: number
          minimum: 0
          maximum: 360
          description: Ángulo de fase de la corriente en grados.
          example: 45.5
        sensor_params:
          type: object
          description: Parámetros adicionales obtenidos de los sensores (JSON).
          example:
            temperature_c: 35.2
            humidity_percent: 60
            lux: 85000
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de creación del registro.
          example: "2026-06-20T12:00:00Z"

    TelemetryInput:
      type: object
      description: "Datos enviados por el dispositivo ESP32 al servidor. La latencia no debe superar 3 segundos."
      required:
        - energy_in_wh
        - energy_out_wh
        - voltage_v
        - current_a
        - watts_now
        - current_angle_deg
        - sensor_params
      properties:
        energy_in_wh:
          type: number
          minimum: 0
          example: 1250.75
        energy_out_wh:
          type: number
          minimum: 0
          example: 980.30
        voltage_v:
          type: number
          minimum: 0
          maximum: 30
          example: 12.45
        current_a:
          type: number
          minimum: 0
          example: 2.35
        watts_now:
          type: number
          minimum: 0
          example: 29.26
        current_angle_deg:
          type: number
          minimum: 0
          maximum: 360
          example: 45.5
        sensor_params:
          type: object
          description: Parámetros adicionales de los sensores (JSON).
          example:
            temperature_c: 35.2
            humidity_percent: 60
            lux: 85000

    # ───────────────────────────────────────────
    # NoSQL: Colección device_daily_summary
    # ───────────────────────────────────────────
    EnergySummary:
      type: object
      description: "Resumen diario de generación energética por dispositivo. Almacenado en MongoDB."
      properties:
        _id:
          type: string
          description: Identificador único del resumen diario (ObjectId de MongoDB).
          example: "667575a0e4b0f12345abc123"
        device_id:
          type: integer
          description: Identificador del dispositivo asociado.
          example: 1
        date:
          type: string
          format: date-time
          description: Fecha correspondiente al resumen diario.
          example: "2026-06-20T00:00:00Z"
        total_energy_in_wh:
          type: number
          description: Energía total de entrada registrada durante el día (Wh).
          example: 4520.50
        total_energy_out_wh:
          type: number
          description: Energía total de salida registrada durante el día (Wh).
          example: 3200.25
        hourly_watts:
          type: array
          description: Arreglo con el consumo o generación por hora.
          items:
            type: object
            properties:
              hour:
                type: integer
                minimum: 0
                maximum: 23
                description: Hora del día (0-23).
                example: 14
              watts:
                type: number
                description: Consumo o generación en watts para esa hora.
                example: 350.25
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de generación del resumen.
          example: "2026-06-21T00:05:00Z"

    # ───────────────────────────────────────────
    # NoSQL: Colección device_commands
    # ───────────────────────────────────────────
    Command:
      type: object
      description: "Comandos enviados al servomotor del panel solar. Almacenado en MongoDB."
      properties:
        _id:
          type: string
          description: Identificador único del comando (ObjectId de MongoDB).
          example: "667575a0e4b0f12345abcabc"
        device_id:
          type: integer
          description: Identificador del dispositivo asociado.
          example: 1
        topic:
          type: string
          maxLength: 250
          description: Tópico del MQTT.
          example: "devices/1/commands"
        message:
          type: object
          description: Comando enviado al dispositivo (JSON con angle_deg).
          properties:
            angle_deg:
              type: number
              minimum: 0
              maximum: 360
              description: Ángulo en grados para el servomotor del panel.
              example: 90
        status:
          type: string
          enum: [queued, delivered, rejected]
          description: Estado actual del comando.
          default: queued
          example: "delivered"
        delivered_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha y hora en que el comando fue entregado al dispositivo.
          example: "2026-06-20T12:05:02Z"
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de creación del comando.
          example: "2026-06-20T12:05:00Z"
        updated_at:
          type: string
          format: date-time
          description: Fecha y hora de la última actualización.
          example: "2026-06-20T12:05:02Z"

    SendCommandRequest:
      type: object
      required:
        - topic
        - message
      properties:
        topic:
          type: string
          maxLength: 250
          description: Tópico del MQTT.
          example: "devices/1/commands"
        message:
          type: object
          required:
            - angle_deg
          description: Comando a enviar al dispositivo (JSON con angle_deg).
          properties:
            angle_deg:
              type: number
              minimum: 0
              maximum: 360
              description: Ángulo en grados para el servomotor del panel.
              example: 90

    # ─── Alertas (lógica de negocio, no hay tabla explícita en el diccionario) ───
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        device_id:
          type: integer
          description: Identificador del dispositivo que generó la alerta.
          example: 1
        type:
          type: string
          enum: [LOW_GENERATION, BATTERY_OVERCHARGE, CONNECTIVITY_LOSS]
          description: |
            - LOW_GENERATION: Energía generada significativamente menor al promedio histórico.
            - BATTERY_OVERCHARGE: Nivel de batería > 95%, corte de carga activado.
            - CONNECTIVITY_LOSS: Dispositivo sin conexión por más de 10 minutos.
          example: "BATTERY_OVERCHARGE"
        message:
          type: string
          example: "El nivel de batería ha superado el 95%. Se ha activado el corte de carga automático."
        severity:
          type: string
          enum: [INFO, WARNING, CRITICAL]
          example: "WARNING"
        acknowledged:
          type: boolean
          description: Indica si el usuario reconoció la alerta.
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-06-20T11:45:00Z"
        acknowledged_at:
          type: string
          format: date-time
          nullable: true

    AlertSettings:
      type: object
      properties:
        device_id:
          type: integer
          example: 1
        battery_overcharge_threshold:
          type: number
          description: Umbral de nivel de batería para activar alerta de sobrecarga (%).
          minimum: 50
          maximum: 100
          default: 95
          example: 95
        min_generation_threshold_percent:
          type: number
          description: Porcentaje mínimo de rendimiento respecto al promedio histórico antes de generar alerta (%).
          minimum: 10
          maximum: 100
          default: 70
          example: 70
        connectivity_timeout_minutes:
          type: integer
          description: Minutos sin conexión antes de generar alerta de pérdida de conectividad.
          minimum: 1
          maximum: 60
          default: 10
          example: 10

    # ───────────────────────────────────────────
    # NoSQL: Colección schedules
    # ───────────────────────────────────────────
    Schedule:
      type: object
      description: "Horarios de operación programados por dispositivo. Almacenado en MongoDB."
      properties:
        _id:
          type: integer
          description: Identificador único del horario (PK, AUTO_INCREMENT).
          example: 1
        device_id:
          type: integer
          description: Identificador del dispositivo asociado al horario.
          example: 1
        label:
          type: string
          maxLength: 100
          pattern: "^.{1,100}$"
          description: Nombre o etiqueta descriptiva del horario.
          example: "Horario Diurno Verano"
        start_time:
          type: string
          format: date-time
          description: Hora de inicio de la programación.
          example: "2026-06-20T06:00:00Z"
        end_time:
          type: string
          format: date-time
          description: Hora de finalización de la programación.
          example: "2026-06-20T18:00:00Z"
        active:
          type: boolean
          description: Indica si el horario se encuentra activo.
          default: true
          example: true
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha y hora de la última actualización.
          example: "2026-06-20T10:30:00Z"

    CreateScheduleRequest:
      type: object
      required:
        - label
        - start_time
        - end_time
      properties:
        label:
          type: string
          maxLength: 100
          pattern: "^.{1,100}$"
          description: Nombre o etiqueta descriptiva del horario.
          example: "Horario Diurno Verano"
        start_time:
          type: string
          format: date-time
          description: Hora de inicio de la programación.
          example: "2026-06-20T06:00:00Z"
        end_time:
          type: string
          format: date-time
          description: Hora de finalización de la programación.
          example: "2026-06-20T18:00:00Z"
        active:
          type: boolean
          default: true

    # ─── Auditoría (tabla audits) ───
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          example: 1
        action_detail:
          type: string
          description: Descripción de la acción realizada.
          example: "Usuario inició sesión correctamente"
        before_value:
          type: string
          nullable: true
          description: Valor previo al cambio.
          example: "{\"status\":\"pending\"}"
        after_value:
          type: string
          nullable: true
          description: Valor posterior al cambio.
          example: "{\"status\":\"completed\"}"
        operation_type:
          type: string
          description: Tipo de operación registrada.
          example: "UPDATE"
        table_name:
          type: string
          description: Tabla afectada por la operación.
          example: "devices"
        register_id:
          type: integer
          description: Identificador del registro afectado.
          example: 42
        status:
          type: string
          description: Estado general del evento de auditoría.
          example: "SUCCESS"
        result_status:
          type: string
          description: Resultado final de la operación.
          example: "APPLIED"
        action_date:
          type: string
          format: date-time
          example: "2026-06-20T12:00:00Z"

    # ─── Paginación ───
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total_items:
          type: integer
          example: 150
        total_pages:
          type: integer
          example: 8

    # ─── Error (RFC 9457) ───
    ErrorResponse:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - code
        - technical_detail
        - user_message
      properties:
        type:
          type: string
          format: uri
          description: URI de referencia que identifica el tipo de problema.
          example: "https://api.ojosdesol.com/problems/client-validation-error"
        title:
          type: string
          description: Descripción corta del problema.
          example: "Error de Validación"
        status:
          type: integer
          description: Código HTTP del error.
          example: 400
        detail:
          type: string
          description: Explicación específica de esta ocurrencia.
          example: "The request contains fields with invalid or missing values."
        instance:
          type: string
          format: uri
          description: Ruta/ID de la solicitud que falló.
          example: "/users"
        code:
          type: string
          description: Código para identificar el error.
          example: "CLIENT_VALIDATION_ERROR"
        technical_detail:
          type: string
          description: Descripción técnica detallada del error.
          example: "Validation failed for fields: 'email', 'age'."
        user_message:
          type: string
          description: Mensaje genérico para el usuario final.
          example: "Algunos campos contienen errores. Por favor revísalos e intenta de nuevo."
        errors:
          type: array
          description: Detalles específicos de los campos que fallaron la validación.
          items:
            type: object
            required:
              - detail
              - pointer
            properties:
              detail:
                type: string
                description: Descripción del error de validación.
                example: "El campo 'email' es requerido."
              pointer:
                type: string
                description: Ruta del campo dentro del payload.
                example: "/email"
